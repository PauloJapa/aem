services:

  # ──────────────────────────────────────────
  # PHP-FPM 8.3 — aplicação Laravel
  # ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: erp_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-erp}
      DB_USERNAME: ${DB_USERNAME:-erp_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@erp.local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp_network

  # ──────────────────────────────────────────
  # Nginx — proxy reverso para o PHP-FPM
  # ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - erp_network

  # ──────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp_postgres
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-erp}
      POSTGRES_USER: ${DB_USERNAME:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - erp_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-erp_user} -d ${DB_DATABASE:-erp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - erp_network

  # ──────────────────────────────────────────
  # Redis — cache + filas
  # ──────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: erp_redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - erp_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - erp_network

  # ──────────────────────────────────────────
  # Laravel Horizon — worker de filas
  # ──────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: erp_horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-erp}
      DB_USERNAME: ${DB_USERNAME:-erp_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
    depends_on:
      - app
      - redis
    networks:
      - erp_network

  # ──────────────────────────────────────────
  # Laravel Scheduler — cron interno
  # ──────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: erp_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./src:/var/www
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-erp}
      DB_USERNAME: ${DB_USERNAME:-erp_user}
      DB_PASSWORD: ${DB_PASSWORD:-caro12lina}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
    depends_on:
      - app
    networks:
      - erp_network

  # ──────────────────────────────────────────
  # Node / Vite — build do frontend em dev
  # ──────────────────────────────────────────
  vite:
    image: node:20-alpine
    container_name: erp_vite
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./src:/var/www
    networks:
      - erp_network

  # ──────────────────────────────────────────
  # pgAdmin 4 — interface web para PostgreSQL
  # ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: erp_pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@erp.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - erp_pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres
    networks:
      - erp_network

  # ──────────────────────────────────────────
  # Mailpit — captura de emails em dev
  # (substitui Mailtrap, roda local, zero config)
  # ──────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: erp_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"   # interface web
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP
    networks:
      - erp_network

  # ──────────────────────────────────────────
  # Laravel Telescope — debug e profiling (dev)
  # Roda via nginx/app, sem container extra
  # Acessar em: http://localhost:8080/telescope
  # ──────────────────────────────────────────

# ──────────────────────────────────────────
# Volumes persistentes
# ──────────────────────────────────────────
volumes:
  erp_postgres_data:
    driver: local
  erp_redis_data:
    driver: local
  erp_pgadmin_data:
    driver: local

# ──────────────────────────────────────────
# Rede interna
# ──────────────────────────────────────────
networks:
  erp_network:
    driver: bridge
