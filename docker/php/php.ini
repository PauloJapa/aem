[PHP]
; ── Geral ──────────────────────────────────────────────────────────────────
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
upload_max_filesize = 50M
post_max_size = 50M
default_charset = UTF-8

; ── OPcache (desativado em dev para refletir mudanças imediato) ────────────
opcache.enable = 0
opcache.enable_cli = 0

; ── Timezone ────────────────────────────────────────────────────────────────
date.timezone = America/Sao_Paulo

; ── Erros (dev — exibir tudo) ───────────────────────────────────────────────
error_reporting = E_ALL
display_errors = On
display_startup_errors = On
log_errors = On
